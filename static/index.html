<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후기 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f5f4f0;
  --card: #ffffff;
  --border: #e2e0d8;
  --text: #1a1917;
  --muted: #7a7870;
  --accent-a: #2d5a3d;   /* 창억 - 녹색 계열 */
  --accent-b: #6b3a2a;   /* 명가 - 적갈색 계열 */
  --danger: #c0392b;
  --danger-bg: #fdf0ee;
  --warn: #b8860b;
  --warn-bg: #fefae8;
  --positive: #1a6b3a;
  --positive-bg: #edf7f1;
  --font: 'Noto Sans KR', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── 헤더 ── */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.shop-tabs { display: flex; background: var(--bg); border-radius: var(--radius-sm); padding: 3px; gap: 2px; }
.shop-tab {
  padding: 5px 14px; border-radius: 6px; border: none;
  background: transparent; font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer; transition: all .15s; font-family: var(--font);
}
.shop-tab.active-a { background: var(--accent-a); color: #fff; }
.shop-tab.active-b { background: var(--accent-b); color: #fff; }
.header-right { display: flex; align-items: center; gap: 10px; }
.last-updated { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.refresh-btn {
  padding: 6px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--card);
  font-size: 12px; color: var(--text); cursor: pointer;
  font-family: var(--font); display: flex; align-items: center; gap: 5px;
  transition: background .15s;
}
.refresh-btn:hover { background: var(--bg); }
.refresh-btn.loading .spin { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 레이아웃 ── */
.main { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }
.section { margin-bottom: 28px; }
.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
}

/* ── 요약 카드 ── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.stat-card.danger-card { background: var(--danger-bg); border-color: #f0c4c0; }
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.stat-val { font-size: 28px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
.stat-val.danger { color: var(--danger); }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.stat-accent-a .stat-val { color: var(--accent-a); }

/* ── 2열 그리드 ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

/* ── 카드 공통 ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
}
.card-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; }

/* ── 별점 분포 ── */
.dist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.dist-label { font-size: 12px; font-family: var(--mono); width: 16px; text-align: right; color: var(--muted); }
.dist-bar-wrap { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.dist-bar { height: 100%; border-radius: 4px; transition: width .5s ease; }
.dist-bar.s5 { background: #2d9a5f; }
.dist-bar.s4 { background: #5db87a; }
.dist-bar.s3 { background: #e6b84a; }
.dist-bar.s2 { background: #e07b3a; }
.dist-bar.s1 { background: var(--danger); }
.dist-count { font-size: 11px; font-family: var(--mono); color: var(--muted); width: 28px; text-align: right; }

/* ── 플랫폼 비교 ── */
.platform-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.platform-row:last-child { border: none; }
.platform-name { font-size: 13px; font-weight: 500; }
.platform-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700;
}
.badge-jasa { background: #e8f0fd; color: #2650a8; }
.badge-ss { background: #e6f7f0; color: #1a6b3a; }
.platform-meta { font-size: 12px; color: var(--muted); font-family: var(--mono); }

/* ── TOP 3 상품 ── */
.product-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.product-item:last-child { border: none; padding-bottom: 0; }
.product-rank {
  font-size: 11px; font-family: var(--mono); font-weight: 700;
  color: var(--muted); width: 18px; flex-shrink: 0; padding-top: 1px;
}
.product-name { font-size: 13px; line-height: 1.4; flex: 1; }
.product-name small { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }
.product-count { font-size: 12px; font-family: var(--mono); font-weight: 500; flex-shrink: 0; }
.product-count.neg { color: var(--danger); }

/* ── 키워드 ── */
.keyword-section { margin-bottom: 12px; }
.keyword-section-title { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
.keyword-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-size: 12px; padding: 4px 10px; border-radius: 20px;
  font-weight: 500; display: flex; align-items: center; gap: 4px;
}
.chip-pos { background: var(--positive-bg); color: var(--positive); }
.chip-neg { background: var(--danger-bg); color: var(--danger); }
.chip-count { font-size: 10px; font-family: var(--mono); opacity: .7; }
.period-toggle {
  display: flex; gap: 4px; margin-bottom: 12px;
}
.period-btn {
  font-size: 11px; padding: 3px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; font-family: var(--font);
}
.period-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

/* ── 후기 목록 ── */
.filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-btn {
  font-size: 12px; padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted); cursor: pointer; font-family: var(--font);
  transition: all .15s;
}
.filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
.review-list { display: flex; flex-direction: column; gap: 10px; }
.review-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.review-card.low { border-left: 3px solid var(--danger); }
.review-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 8px; margin-bottom: 8px;
}
.stars { display: flex; gap: 2px; }
.star { font-size: 12px; }
.star.on { color: #e6b84a; }
.star.off { color: #d0cfc8; }
.score-num { font-size: 12px; font-family: var(--mono); font-weight: 500; margin-left: 4px; }
.score-num.low { color: var(--danger); }
.review-meta { display: flex; align-items: center; gap: 6px; }
.rev-badge {
  font-size: 10px; padding: 2px 7px; border-radius: 6px;
}
.rev-badge.jasa { background: #e8f0fd; color: #2650a8; }
.rev-badge.smartstore { background: #e6f7f0; color: #1a6b3a; }
.rev-badge.kakao { background: #fff3e0; color: #c67c00; }
.rev-badge.naver { background: #e6f7f0; color: #1a6b3a; }
.rev-date { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.review-product { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.review-content { font-size: 13px; line-height: 1.6; color: #3a3836; }
.review-title { font-size: 13px; font-weight: 500; }
.low-tag {
  font-size: 10px; background: var(--danger-bg); color: var(--danger);
  padding: 2px 7px; border-radius: 6px; font-weight: 700; margin-left: 6px;
}

/* ── 로딩 / 에러 ── */
.loading-state {
  text-align: center; padding: 60px 0;
  color: var(--muted); font-size: 14px;
}
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--text); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto 14px;
}
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 10px 20px;
  border-radius: var(--radius-sm); font-size: 13px; z-index: 999;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
.toast.show { opacity: 1; }


/* ── 로딩바 ── */
.progress-wrap {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;
  height: 3px; background: transparent;
  pointer-events: none;
}
.progress-bar {
  height: 3px; width: 0%; transition: width 0.4s ease;
}
.progress-bar.a { background: var(--accent-a); }
.progress-bar.b { background: var(--accent-b); }
.collecting-banner {
  position: fixed; top: 56px; left: 0; width: 100%; z-index: 998;
  background: #fff8e1; border-bottom: 1px solid #ffe082;
  padding: 10px 20px; font-size: 13px; color: #7b5c00;
  display: none; align-items: center; gap: 10px;
}
.collecting-banner.show { display: flex; }
.dot-anim span {
  animation: blink 1.2s infinite;
  display: inline-block;
}
.dot-anim span:nth-child(2) { animation-delay: 0.2s; }
.dot-anim span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }


/* ── 메모장 ── */
.memo-wrap { padding: 0; }
.memo-area {
  width: 100%; min-height: 500px; padding: 16px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--card); font-family: var(--font);
  font-size: 14px; color: var(--text); line-height: 1.8;
  resize: vertical; outline: none;
}
.memo-area:focus { border-color: var(--accent-a); }
.memo-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px; font-size: 12px; color: var(--muted);
}
.memo-save-btn {
  padding: 8px 24px; border-radius: var(--radius-sm);
  border: 1px solid var(--accent-a); background: var(--accent-a);
  color: #fff; font-size: 13px; cursor: pointer;
  font-family: var(--font); font-weight: 500;
  transition: opacity .15s;
}
.memo-save-btn:hover { opacity: .85; }
.memo-save-btn:disabled { opacity: .5; cursor: default; }
.memo-saved { color: var(--positive); font-size: 12px; }


/* ── 페이지네이션 ── */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; margin-top: 16px; flex-wrap: wrap;
}
.page-btn {
  min-width: 32px; height: 32px; padding: 0 8px;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--card); font-size: 13px; color: var(--muted);
  cursor: pointer; font-family: var(--font); transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.page-btn:hover { background: var(--bg); color: var(--text); }
.page-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
.page-btn:disabled { opacity: .4; cursor: default; }
.page-info { font-size: 12px; color: var(--muted); margin: 0 8px; }


.memo-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.memo-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.memo-item-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.memo-item-time { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.memo-delete-btn {
  font-size: 11px; padding: 3px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--danger); cursor: pointer; font-family: var(--font);
  transition: all .15s;
}
.memo-delete-btn:hover { background: var(--danger-bg); }
.memo-item-content {
  font-size: 13px; line-height: 1.7; color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}
.memo-empty { text-align: center; padding: 24px 0; color: var(--muted); font-size: 13px; }

/* ── 반응형 ── */
@media (max-width: 640px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .header { padding: 0 14px; }
  .last-updated { display: none; }
  .main { padding: 16px 14px 60px; }
}
</style>
</head>
<body>


<div class="progress-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="collecting-banner" id="collectingBanner">
  <span>후기 수집 중</span>
  <span class="dot-anim"><span>.</span><span>.</span><span>.</span></span>
  <span id="collectStatusMsg" style="font-size:11px;color:#a07800">준비 중...</span>
  <span style="font-size:11px;color:#c08800;margin-left:4px">|</span>
  <span style="font-size:11px;color:#a07800">경과 <b id="collectElapsed">0초</b></span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span id="collectPct" style="font-size:11px;font-weight:700;color:#7b5c00">0%</span>
    <div style="width:100px;height:4px;background:#ffe082;border-radius:4px;overflow:hidden">
      <div id="collectPctBar" style="height:100%;width:0%;background:#b8860b;border-radius:4px;transition:width .5s ease"></div>
    </div>
  </div>
</div>
<header class="header">
  <div class="header-left">
    <span class="logo">후기 대시보드</span>
    <div class="shop-tabs">
      <button class="shop-tab active-a" onclick="switchShop('changeok', this)">창억떡</button>
      <button class="shop-tab" onclick="switchShop('myeongga', this)">명가삼대떡집</button>
      <button class="shop-tab" onclick="switchShop('memo', this)">메모장</button>
      <button class="shop-tab" onclick="switchShop('log', this)">수집로그</button>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="triggerCollect()">
      <span class="spin">↻</span> 새로고침
    </button>
  </div>
</header>

<div class="main" id="mainContent">
  <div class="loading-state">
    <div class="spinner"></div>
    데이터 불러오는 중...
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
// 상태
// ════════════════════════════════════════
let allData     = null;
let currentShop = 'changeok';
let reviewFilter  = 'all';
let keywordPeriod = 'all';
let collectPollTimer = null;

function p2(n){ return String(n).padStart(2,'0'); }
function fmtSec(s){ return s>=60 ? Math.floor(s/60)+'분 '+(s%60)+'초' : s+'초'; }

// ════════════════════════════════════════
// 초기 로딩 오버레이
// ════════════════════════════════════════
(function(){
  const overlay = document.createElement('div');
  overlay.id = 'initOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:10000;background:#f5f4f0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:inherit;transition:opacity .5s';
  overlay.innerHTML =
    '<div style="font-size:22px;font-weight:700;color:#1a1917">후기 대시보드</div>'+
    '<div style="width:240px;height:3px;background:#e2e0d8;border-radius:4px;overflow:hidden">'+
      '<div id="initBar" style="height:100%;width:0%;background:#2d5a3d;border-radius:4px;transition:width .5s ease"></div>'+
    '</div>'+
    '<div id="initMsg" style="font-size:13px;color:#7a7870">서버 연결 중...</div>';
  document.body.prepend(overlay);
  const bar = document.getElementById('initBar');
  const msg = document.getElementById('initMsg');
  const steps = [[20,'서버 연결 중...'],[50,'데이터 확인 중...'],[80,'준비 중...'],[100,'완료!']];
  let i=0;
  const t = setInterval(()=>{ if(i>=steps.length){clearInterval(t);return;} bar.style.width=steps[i][0]+'%'; msg.textContent=steps[i][1]; i++; },700);
  window._hideOverlay = function(){
    const el=document.getElementById('initOverlay');
    if(!el||el.style.display==='none')return;
    el.style.opacity='0';
    setTimeout(()=>el.style.display='none',500);
  };
  setTimeout(window._hideOverlay, 10000);
})();

// ════════════════════════════════════════
// 데이터 로드
// ════════════════════════════════════════
async function loadData(){
  try {
    const res = await fetch('/api/data');
    if(res.ok){
      const data = await res.json();
      allData = data;
      updateLastUpdated(data.last_updated);
      if(currentShop !== 'memo' && currentShop !== 'log') render();
      window._hideOverlay && window._hideOverlay();
      // 수집 중이면 배너 표시
      if(data.collecting) startCollectPolling();
    } else {
      // 데이터 없음 → 자동 수집
      window._hideOverlay && window._hideOverlay();
      showCollectingScreen();
      try{ await fetch('/api/collect',{method:'POST'}); }catch(e){}
      startCollectPolling();
    }
  } catch(e){
    window._hideOverlay && window._hideOverlay();
    document.getElementById('mainContent').innerHTML =
      '<div class="loading-state"><div style="font-size:13px;color:var(--muted)">서버 연결 중... 자동 재시도합니다.</div></div>';
    setTimeout(loadData, 4000);
  }
}

function showCollectingScreen(){
  document.getElementById('mainContent').innerHTML =
    '<div class="loading-state">'+
    '<div class="spinner"></div>'+
    '<div style="font-size:15px;font-weight:500;margin-bottom:6px">후기를 수집하고 있어요</div>'+
    '<div id="collectDetailMsg" style="font-size:12px;color:var(--muted)">잠시만 기다려주세요...</div>'+
    '</div>';
}

function updateLastUpdated(iso){
  if(!iso) return;
  const d = new Date(iso);
  document.getElementById('lastUpdated').textContent =
    d.getFullYear()+'.'+p2(d.getMonth()+1)+'.'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes())+' 기준';
}

// ════════════════════════════════════════
// 수집 트리거
// ════════════════════════════════════════
async function triggerCollect(){
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.disabled = true;
  showToast('수집을 시작했습니다.');
  try{ await fetch('/api/collect',{method:'POST'}); }catch(e){}
  startCollectPolling();
}

// ════════════════════════════════════════
// 수집 폴링 (3초마다 상태 확인)
// ════════════════════════════════════════
function startCollectPolling(){
  if(collectPollTimer) clearInterval(collectPollTimer);
  document.getElementById('collectingBanner').classList.add('show');
  const bar = document.getElementById('progressBar');
  const accent = currentShop==='changeok' ? 'a' : 'b';
  bar.className = 'progress-bar '+accent;
  bar.style.width = '2%';

  const started = Date.now();

  collectPollTimer = setInterval(async ()=>{
    try{
      // 진행상황 업데이트
      const stRes = await fetch('/api/status');
      if(stRes.ok){
        const st = await stRes.json();
        const elapsed = Math.floor((Date.now()-started)/1000);
        // 경과시간
        const elEl = document.getElementById('collectElapsed');
        if(elEl) elEl.textContent = fmtSec(elapsed);
        // 진행 메시지
        const msgEl = document.getElementById('collectStatusMsg');
        if(msgEl && st.progress_msg) msgEl.textContent = st.progress_msg;
        // 퍼센트
        const pct = st.progress_pct || 0;
        const pctEl = document.getElementById('collectPct');
        const pctBar = document.getElementById('collectPctBar');
        if(pctEl) pctEl.textContent = pct+'%';
        if(pctBar) pctBar.style.width = Math.max(pct,2)+'%';
        // 진행바
        if(bar && pct>0) bar.style.width = Math.max(pct,2)+'%';
        // 메인 화면 메시지
        const detailEl = document.getElementById('collectDetailMsg');
        if(detailEl && st.progress_msg) detailEl.textContent = st.progress_msg;
        // 오류
        if(st.last_error && !st.collecting){
          clearInterval(collectPollTimer); collectPollTimer=null;
          finishProgressBar();
          document.getElementById('mainContent').innerHTML =
            '<div class="loading-state">'+
            '<div style="font-size:15px;color:var(--danger);margin-bottom:10px">❌ 수집 중 오류 발생</div>'+
            '<div style="font-size:12px;color:var(--danger);background:var(--danger-bg);padding:12px;border-radius:8px;max-width:480px;text-align:left;word-break:break-all;font-family:var(--mono)">'+st.last_error+'</div>'+
            (st.error_detail?'<details style="margin-top:10px;max-width:480px;text-align:left"><summary style="font-size:11px;color:var(--muted);cursor:pointer">상세 보기</summary><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap;word-break:break-all;margin-top:6px">'+st.error_detail+'</pre></details>':'')+
            '<button class="refresh-btn" style="margin-top:16px" onclick="triggerCollect()">↻ 다시 시도</button>'+
            '</div>';
          return;
        }
      }
      // 데이터 완료 확인
      const res = await fetch('/api/data');
      if(res.ok){
        const data = await res.json();
        if(!allData || data.last_updated !== allData.last_updated){
          allData = data;
          updateLastUpdated(data.last_updated);
          if(currentShop!=='memo' && currentShop!=='log') render();
          clearInterval(collectPollTimer); collectPollTimer=null;
          finishProgressBar();
          showToast('✅ 수집 완료! 데이터가 업데이트됐어요.');
        }
      }
    }catch(e){}
  }, 3000);
}

function finishProgressBar(){
  const bar = document.getElementById('progressBar');
  if(bar){ bar.style.width='100%'; setTimeout(()=>bar.style.width='0%',800); }
  document.getElementById('collectingBanner').classList.remove('show');
  const btn = document.getElementById('refreshBtn');
  btn.classList.remove('loading'); btn.disabled=false;
  const pctBar = document.getElementById('collectPctBar');
  if(pctBar) pctBar.style.width='100%';
}

// ════════════════════════════════════════
// 탭 전환
// ════════════════════════════════════════
function switchShop(shop, el){
  currentShop = shop;
  document.querySelectorAll('.shop-tab').forEach(t=>t.classList.remove('active-a','active-b'));
  if(shop==='memo'){ el.classList.add('active-a'); renderMemo(); return; }
  if(shop==='log'){  el.classList.add('active-a'); renderLog();  return; }
  el.classList.add(shop==='changeok' ? 'active-a' : 'active-b');
  reviewFilter = 'all';
  if(!allData){
    // 수집 중이면 수집 화면 유지
    if(collectPollTimer) showCollectingScreen();
    else document.getElementById('mainContent').innerHTML =
      '<div class="loading-state"><div class="spinner"></div>데이터 불러오는 중...</div>';
    return;
  }
  render();
}

// ════════════════════════════════════════
// 전체 렌더
// ════════════════════════════════════════
function render(){
  if(!allData) return;
  if(currentShop==='memo'){ renderMemo(); return; }
  if(currentShop==='log'){  renderLog();  return; }
  const d = allData[currentShop];

  mc.innerHTML = `

    <div class="grid-2 section">
      <div>${renderScoreDist(d)}</div>

    </div>

    <div class="grid-2 section">
      <div>${renderTopProducts(d)}</div>
      <div>${renderNegativeProducts(d)}</div>
    </div>
    <div class="section">${renderKeywords(d)}</div>

// ════════════════════════════════════════
// 요약 카드
// ════════════════════════════════════════
function renderStatCards(d){
  const negRate  = d.total_count ? Math.round(d.total_negative/d.total_count*100) : 0;
  const wNegRate = d.week_count  ? Math.round(d.week_negative/d.week_count*100)   : 0;
  return `<div class="stat-grid section">
    <div class="stat-card"><div class="stat-label">전체 후기</div><div class="stat-val">${d.total_count.toLocaleString()}</div><div class="stat-sub">평균 ★${d.avg_score}</div></div>
    <div class="stat-card ${d.total_negative>0?'danger-card':''}"><div class="stat-label">전체 3점 이하</div><div class="stat-val ${d.total_negative>0?'danger':''}">${d.total_negative.toLocaleString()}</div><div class="stat-sub">${negRate}% 비율</div></div>
    <div class="stat-card"><div class="stat-label">최근 7일 후기</div><div class="stat-val">${d.week_count.toLocaleString()}</div><div class="stat-sub">지난 7일간</div></div>
    <div class="stat-card ${d.week_negative>0?'danger-card':''}"><div class="stat-label">최근 7일 부정</div><div class="stat-val ${d.week_negative>0?'danger':''}">${d.week_negative.toLocaleString()}</div><div class="stat-sub">${wNegRate}% 비율</div></div>
  </div>`;
}

// ════════════════════════════════════════
// 별점 분포
// ════════════════════════════════════════
function renderScoreDist(d){
  const dist = d.score_distribution||{};
  const total = Object.values(dist).reduce((a,b)=>a+b,0)||1;
  const cls = {'5':'s5','4':'s4','3':'s3','2':'s2','1':'s1'};
  let rows='';
  for(let s=5;s>=1;s--){
    const cnt=dist[s]||0, pct=Math.round(cnt/total*100);
    rows+=`<div class="dist-row"><div class="dist-label">${s}</div><div class="dist-bar-wrap"><div class="dist-bar ${cls[s]}" style="width:${pct}%"></div></div><div class="dist-count">${cnt}</div></div>`;
  }
  return `<div class="card"><div class="card-title">별점 분포</div>${rows}</div>`;
}

// ════════════════════════════════════════
// 플랫폼 비교
// ════════════════════════════════════════
function renderPlatformCompare(d){
  const ps = d.platform_stats||{};
  const platforms=[{key:'direct',label:'자사몰',badge:'jasa'},{key:'kakao',label:'자사몰(카카오)',badge:'jasa'},{key:'naver',label:'자사몰(네이버)',badge:'jasa'},{key:'smartstore',label:'스마트스토어',badge:'smartstore'}];
  let rows='';
  for(const p of platforms){
    const stat=ps[p.key];
    if(!stat||stat.count===0)continue;
    rows+=`<div class="platform-row"><div><span class="platform-badge ${p.badge}">${p.label}</span></div><div style="display:flex;gap:12px;align-items:center"><span class="platform-meta">★${stat.avg_score} &nbsp; ${stat.count}건</span>${stat.negative>0?`<span style="font-size:11px;color:var(--danger);font-family:var(--mono)">▼${stat.negative}</span>`:''}</div></div>`;
  }
  if(!rows) rows='<div style="font-size:13px;color:var(--muted);padding:8px 0">데이터 없음</div>';
  return `<div class="card"><div class="card-title">플랫폼 비교</div>${rows}</div>`;
}

// ════════════════════════════════════════
// 트렌드 차트
// ════════════════════════════════════════
function renderTrend(d){
  return `<div class="card"><div class="card-title">주간 트렌드</div><canvas id="trendChart" height="120"></canvas></div>`;
}
function renderTrendChart(d){
  const trend=d.weekly_trend||[];
  if(!trend.length)return;
  const ctx=document.getElementById('trendChart');
  if(!ctx)return;
  if(window._trendChart)window._trendChart.destroy();
  const accent=currentShop==='changeok'?'#2d5a3d':'#6b3a2a';
  window._trendChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:trend.map(t=>t.week.slice(5)),
      datasets:[
        {label:'후기수',data:trend.map(t=>t.count),backgroundColor:accent+'30',borderColor:accent,borderWidth:1.5,borderRadius:4,yAxisID:'y'},
        {label:'부정',data:trend.map(t=>t.negative),backgroundColor:'#c0392b25',borderColor:'#c0392b',borderWidth:1.5,borderRadius:4,yAxisID:'y',type:'bar'},
        {label:'평균별점',data:trend.map(t=>t.avg_score),type:'line',borderColor:'#e6b84a',borderWidth:2,pointRadius:3,tension:0.3,yAxisID:'y2'},
      ]
    },
    options:{
      responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{font:{size:11},boxWidth:10}}},
      scales:{
        y:{beginAtZero:true,grid:{color:'#e2e0d820'},ticks:{font:{size:11}}},
        y2:{position:'right',min:0,max:5,grid:{display:false},ticks:{font:{size:11}}},
        x:{grid:{display:false},ticks:{font:{size:11}}}
      }
    }
  });
}

// TOP 상품
// ════════════════════════════════════════

  const list=(d.top_products_all||[]);

// ════════════════════════════════════════
// 키워드
// ════════════════════════════════════════
function renderKeywords(d){
  const posAll=d.positive_keywords_all||[], negAll=d.negative_keywords_all||[];
  function chips(kws,cls){ return kws.length ? kws.map(k=>`<span class="chip ${cls}">${k.word} <span class="chip-count">${k.count}</span></span>`).join('') : '<span style="font-size:12px;color:var(--muted)">데이터 부족</span>'; }
  return `<div class="card"><div class="card-title">키워드 분석</div>
    <div class="period-toggle">
      <button class="period-btn active" id="kwPeriodAll" onclick="setKwPeriod('all')">전체</button>
      <button class="period-btn" id="kwPeriodWeek" onclick="setKwPeriod('week')">최근 7일</button>
    </div>
    <div class="keyword-section"><div class="keyword-section-title">✓ 긍정 (4~5점)</div><div class="keyword-chips" id="posChips">${chips(posAll,'chip-pos')}</div></div>
    <div class="keyword-section" style="margin-top:12px"><div class="keyword-section-title">✗ 부정 (1~3점)</div><div class="keyword-chips" id="negChips">${chips(negAll,'chip-neg')}</div></div>
  </div>`;

function setKwPeriod(period){
  if(!allData)return;
  document.getElementById('kwPeriodAll').classList.toggle('active',period==='all');
  document.getElementById('kwPeriodWeek').classList.toggle('active',period==='week');
  const d=allData[currentShop];
  const pos=period==='all'?d.positive_keywords_all:d.positive_keywords_week;
  const neg=period==='all'?d.negative_keywords_all:d.negative_keywords_week;
  function chips(kws,cls){ return kws&&kws.length?kws.map(k=>`<span class="chip ${cls}">${k.word} <span class="chip-count">${k.count}</span></span>`).join(''):'<span style="font-size:12px;color:var(--muted)">데이터 부족</span>'; }

  document.getElementById('negChips').innerHTML=chips(neg,'chip-neg');
}

// ════════════════════════════════════════
// 후기 목록
// ════════════════════════════════════════
let currentPage=1, filteredReviews=[];
const PAGE_SIZE=10;

function renderReviews(d){
  filteredReviews=d.reviews||[]; currentPage=1;
  return `<div class="card"><div class="card-title">후기 목록</div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('low',this)">3점 이하</button>
      <button class="filter-btn" onclick="setFilter('jasa',this)">자사몰</button>
      <button class="filter-btn" onclick="setFilter('ss',this)">스마트스토어</button>
    </div>
    <div class="review-list" id="reviewList"></div>
    <div class="pagination" id="pagination"></div>
  </div>`;
}
function setFilter(f,el){
  reviewFilter=f; currentPage=1;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const d=allData[currentShop];
  let reviews=d.reviews||[];
  if(f==='low')  reviews=reviews.filter(r=>r.score<=3);
  else if(f==='jasa') reviews=reviews.filter(r=>r.platform!=='smartstore');
  else if(f==='ss')   reviews=reviews.filter(r=>r.platform==='smartstore');
  filteredReviews=reviews;
  renderReviewPage();
}
function renderReviewPage(){
  const total=filteredReviews.length, totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  currentPage=Math.min(currentPage,totalPages);
  const start=(currentPage-1)*PAGE_SIZE;
  const listEl=document.getElementById('reviewList'), pagEl=document.getElementById('pagination');
  if(!listEl)return;
  listEl.innerHTML=buildReviewCards(filteredReviews.slice(start,start+PAGE_SIZE));
  let btns=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>◀</button>`;
  let sp=Math.max(1,currentPage-2), ep=Math.min(totalPages,sp+4);
  if(ep-sp<4)sp=Math.max(1,ep-4);
  for(let i=sp;i<=ep;i++) btns+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  btns+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>▶</button>`;
  btns+=`<span class="page-info">${total}건 중 ${start+1}~${Math.min(start+PAGE_SIZE,total)}</span>`;
  pagEl.innerHTML=btns;
}
function goPage(p){ currentPage=p; renderReviewPage(); document.getElementById('reviewList').scrollIntoView({behavior:'smooth',block:'start'}); }
function buildReviewCards(reviews){
  if(!reviews.length)return'<div style="text-align:center;padding:32px 0;color:var(--muted);font-size:13px">해당 후기가 없어요</div>';
  return reviews.map(r=>{
    const isLow=r.score<=3;
    const stars=[1,2,3,4,5].map(i=>`<span class="star ${i<=r.score?'on':'off'}">★</span>`).join('');
    const platLabel={direct:'자사몰',kakao:'카카오',naver:'네이버',smartstore:'스마트스토어'}[r.platform]||r.platform;
    const badgeCls=r.platform==='smartstore'?'smartstore':r.platform==='kakao'?'kakao':'jasa';
    return `<div class="review-card ${isLow?'low':''}">
      <div class="review-header">
        <div style="display:flex;align-items:center"><div class="stars">${stars}</div><span class="score-num ${isLow?'low':''}">${r.score}.0</span>${isLow?'<span class="low-tag">주의</span>':''}</div>
        <div class="review-meta"><span class="rev-badge ${badgeCls}">${platLabel}</span><span class="rev-date">${r.date}</span></div>
      </div>
      ${r.product?`<div class="review-product">${r.product}</div>`:''}
      <div class="review-content">${r.content||r.title||'<span style="color:var(--muted)">본문 없음</span>'}</div>
    </div>`;
  }).join('');
}

let memoList=[];
async function renderMemo(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML=`<div class="memo-wrap section">
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">새 메모 작성</div>
      <textarea class="memo-area" id="memoArea" placeholder="여기에 메모를 입력하세요..."></textarea>
      <div class="memo-footer"><span class="memo-saved" id="memoSaved"></span><button class="memo-save-btn" id="memoSaveBtn" onclick="saveMemo()">저장</button></div>
    </div>
    <div id="memoListWrap"></div>
  </div>`;
  await loadMemos();
}
async function loadMemos(){
  try{ const res=await fetch('/api/memo'); if(res.ok){ const d=await res.json(); memoList=d.memos||[]; renderMemoList(); } }catch(e){}
}
function renderMemoList(){
  const wrap=document.getElementById('memoListWrap'); if(!wrap)return;
  if(!memoList.length){ wrap.innerHTML='<div class="memo-empty">저장된 메모가 없어요</div>'; return; }
  wrap.innerHTML=`<div class="card"><div class="card-title">저장된 메모 (${memoList.length}개)</div><div class="memo-list">${
    memoList.map(m=>`<div class="memo-item" id="memo-${CSS.escape(m.id)}">
      <div class="memo-item-header"><span class="memo-item-time">${m.saved_at}</span><button class="memo-delete-btn" onclick="deleteMemo('${m.id}')">삭제</button></div>
      <div class="memo-item-content">${m.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`).join('')
  }</div></div>`;
}
async function saveMemo(){
  const btn=document.getElementById('memoSaveBtn'), saved=document.getElementById('memoSaved'), area=document.getElementById('memoArea');
  if(!area||!area.value.trim()){ saved.textContent='내용을 입력해주세요'; saved.style.color='var(--danger)'; return; }
  btn.disabled=true; btn.textContent='저장 중...'; saved.textContent='';
  try{
    const res=await fetch('/api/memo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:area.value})});
    if(res.ok){ area.value=''; saved.textContent='✓ 저장됐어요!'; saved.style.color='var(--positive)'; setTimeout(()=>saved.textContent='',3000); await loadMemos(); }
    else throw new Error();
  }catch(e){ saved.textContent='저장 실패'; saved.style.color='var(--danger)'; }
  btn.disabled=false; btn.textContent='저장';
}
async function deleteMemo(id){
  if(!confirm('이 메모를 삭제할까요?'))return;
  try{ const res=await fetch('/api/memo/'+encodeURIComponent(id),{method:'DELETE'}); if(res.ok){ memoList=memoList.filter(m=>m.id!==id); renderMemoList(); } }catch(e){}
}

// ════════════════════════════════════════
// 수집 로그 탭
// ════════════════════════════════════════
async function renderLog(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading-state"><div class="spinner"></div></div>';
  try{
    const [stRes,logRes]=await Promise.all([fetch('/api/status'),fetch('/api/logs')]);
    const st=await stRes.json(), logs=(await logRes.json()).logs||[];
    let statusHtml='';
    if(st.collecting){
      statusHtml+=`<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#7b5c00">
        🔄 수집 중... &nbsp; ${st.progress_msg||''} &nbsp; <b>${st.progress_pct||0}%</b>
      </div>`;
    }
    if(st.last_error){
      statusHtml+=`<div style="background:var(--danger-bg);border:1px solid #f0c4c0;border-radius:8px;padding:12px 16px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:6px">❌ 마지막 오류</div>
        <div style="font-size:12px;color:var(--danger);font-family:var(--mono);word-break:break-all">${st.last_error}</div>
        ${st.error_detail?`<details style="margin-top:8px"><summary style="font-size:11px;color:var(--muted);cursor:pointer">상세 보기</summary><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap;word-break:break-all;margin-top:6px">${st.error_detail}</pre></details>`:''}
      </div>`;
    }
    if(st.last_success){
      statusHtml+=`<div style="background:var(--positive-bg);border:1px solid #b8dfc8;border-radius:8px;padding:10px 16px;margin-bottom:12px;font-size:12px;color:var(--positive)">✅ 마지막 성공: ${st.last_success.replace('T',' ').slice(0,19)}</div>`;
    }
    const logRows=logs.map(l=>`<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:11px;font-family:var(--mono);color:var(--muted);flex-shrink:0;white-space:nowrap">${l.time}</span>
      <span style="font-size:12px;${l.success?'color:var(--positive)':'color:var(--danger)'}">${l.success?'✅':'❌'} ${l.detail}</span>
    </div>`).join('')||'<div style="font-size:13px;color:var(--muted);text-align:center;padding:20px">로그 없음</div>';
    mc.innerHTML=`<div style="max-width:720px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:15px;font-weight:700">수집 로그</div>
        <button class="refresh-btn" onclick="renderLog()">새로고침</button>
      </div>
      ${statusHtml}
      <div class="card"><div class="card-title">수집 이력 (최근 50건)</div>${logRows}</div>
    </div>`;
  }catch(e){ mc.innerHTML='<div class="loading-state">로그를 불러올 수 없습니다.</div>'; }
}

// ════════════════════════════════════════
// 초기화
// ════════════════════════════════════════
loadData();
setInterval(loadData, 60*60*1000); // 1시간마다 자동 갱신
</script>
</body>
